<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D97706"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Modern Gulf skyline silhouette -->
  <g fill="white">
    <!-- Tall tower (Burj-style) -->
    <rect x="14" y="6" width="2.5" height="20" rx="0.5"/>
    <polygon points="15.25,4 14,7 16.5,7"/>
    <!-- Twisted tower -->
    <rect x="10" y="12" width="2.2" height="14" rx="0.3"/>
    <polygon points="11.1,10.5 10,12.5 12.2,12.5"/>
    <!-- Wide modern tower -->
    <rect x="18" y="10" width="3" height="16" rx="0.5"/>
    <rect x="18.3" y="11" width="2.4" height="1" rx="0.2" fill="#B45309" opacity="0.3"/>
    <rect x="18.3" y="13.5" width="2.4" height="1" rx="0.2" fill="#B45309" opacity="0.3"/>
    <rect x="18.3" y="16" width="2.4" height="1" rx="0.2" fill="#B45309" opacity="0.3"/>
    <rect x="18.3" y="18.5" width="2.4" height="1" rx="0.2" fill="#B45309" opacity="0.3"/>
    <!-- Sail-shaped building -->
    <path d="M23,26 L23,15 Q23,13 25,14 L27,16 L27,26 Z"/>
    <!-- Small building left -->
    <rect x="7" y="18" width="2" height="8" rx="0.3"/>
    <rect x="4.5" y="21" width="2" height="5" rx="0.3"/>
    <!-- Ground line -->
    <rect x="3" y="26" width="26" height="1.5" rx="0.5" opacity="0.8"/>
    <!-- Stars/dots -->
    <circle cx="6" cy="8" r="0.6" opacity="0.5"/>
    <circle cx="26" cy="7" r="0.5" opacity="0.4"/>
    <circle cx="8" cy="11" r="0.4" opacity="0.3"/>
  </g>
</svg>
